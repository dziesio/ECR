name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:

  # ── Tests run on every push and PR ────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Test ecr-harvester
        run: mvn test -q
        working-directory: ecr-harvester

  # ── Build and push images — only on version tags ──────────────────────────────
  build-and-push:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push ecr-harvester
        uses: docker/build-push-action@v5
        with:
          context: ./ecr-harvester
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecr-harvester:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/ecr-harvester:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ecr-api
        uses: docker/build-push-action@v5
        with:
          context: ./ecr-api-python
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecr-api:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/ecr-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ecr-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./ecr-frontend-python
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecr-frontend:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/ecr-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ecr-notifier
        uses: docker/build-push-action@v5
        with:
          context: ./ecr-notifier-python
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecr-notifier:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/ecr-notifier:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to VPS — only on version tags ─────────────────────────────────────
  deploy:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 10105
          script: |
            cd ~/ecr
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
