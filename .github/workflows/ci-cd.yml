name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Run tests for all three services ───────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Test ecr-harvester
        run: mvn test -q
        working-directory: ecr-harvester

      - name: Test ecr-api
        run: mvn test -q
        working-directory: ecr-api

      - name: Test ecr-frontend
        run: mvn test -q
        working-directory: ecr-frontend

      - name: Test ecr-notifier
        run: mvn test -q
        working-directory: ecr-notifier

  # ── Build Docker images and push to ghcr.io ────────────────────────────────
  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ecr-harvester
        uses: docker/build-push-action@v5
        with:
          context: ./ecr-harvester
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ecr-harvester:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ecr-api
        uses: docker/build-push-action@v5
        with:
          context: ./ecr-api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ecr-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ecr-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./ecr-frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ecr-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ecr-notifier
        uses: docker/build-push-action@v5
        with:
          context: ./ecr-notifier
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ecr-notifier:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── SSH into VPS and pull the new images ───────────────────────────────────
  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/ecr
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
