<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark shadow" style="background: linear-gradient(135deg, #1e1b4b 0%, #2563eb 100%);">
    <div class="container">
        <a class="navbar-brand fw-bold tracking-tight" th:href="@{/}">
            <i class="bi bi-journal-text me-1"></i>LibeHub
        </a>
        <div class="navbar-nav ms-auto d-flex flex-row align-items-center gap-3">
            <a class="nav-link px-0 d-flex align-items-center gap-1" th:href="@{/profile}">
                <i class="bi bi-person-circle"></i>
                <span sec:authentication="name" class="d-none d-sm-inline"></span>
            </a>
            <a class="nav-link px-0 d-flex align-items-center gap-1"
               th:href="@{/admin/users}" sec:authorize="hasRole('ADMIN')">
                <i class="bi bi-people-fill"></i>
                <span class="d-none d-sm-inline">Users</span>
            </a>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-sm btn-outline-light">
                    <i class="bi bi-box-arrow-right me-1"></i>Sign out
                </button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
