# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8082

# ─── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/ecr_harvester

# Use a separate history table so ecr-frontend's migrations don't conflict
# with ecr-harvester's in the shared database.
spring.flyway.table=flyway_schema_history_frontend
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── ECR API ──────────────────────────────────────────────────────────────────
ecr.api.base-url=http://localhost:8081

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.ecrharv=INFO
