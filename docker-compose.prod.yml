# Production compose — uses pre-built images from ghcr.io instead of local builds.
# On the VPS: docker compose -f docker-compose.prod.yml --env-file .env up -d

name: ecr

services:

  postgres:
    image: postgres:16-alpine
    container_name: ecr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecr_harvester
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecr_harvester"]
      interval: 5s
      timeout: 5s
      retries: 10

  ecr-harvester:
    image: ghcr.io/dziesio/ecr-harvester:latest
    container_name: ecr-harvester
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecr_harvester
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      LIBRUS_USERNAME: ${LIBRUS_USERNAME}
      LIBRUS_PASSWORD: ${LIBRUS_PASSWORD}
      LIBRUS_FULL_NAME: ${LIBRUS_FULL_NAME:-Student}
      LIBRUS_URL_LOGIN: ${LIBRUS_URL_LOGIN:-https://portal.librus.pl/rodzina/synergia/loguj}
      LIBRUS_URL_GRADES: ${LIBRUS_URL_GRADES:-https://synergia.librus.pl/przegladaj_oceny/uczen}
      LIBRUS_URL_MESSAGES: ${LIBRUS_URL_MESSAGES:-https://synergia.librus.pl/wiadomosci}
      LIBRUS_URL_ATTENDANCE: ${LIBRUS_URL_ATTENDANCE:-https://synergia.librus.pl/przegladaj_nb/uczen}
      SCRAPER_INTERVAL_MINUTES: ${SCRAPER_INTERVAL_MINUTES:-10}
      SCRAPER_JITTER_MINUTES: ${SCRAPER_JITTER_MINUTES:-3}
      BC_USERNAME: ${BC_USERNAME:-}
      BC_PASSWORD: ${BC_PASSWORD:-}
      BC_ENABLED: ${BC_ENABLED:-false}
      SELENIUM_HEADLESS: "true"

  ecr-api:
    image: ghcr.io/dziesio/ecr-api:latest
    container_name: ecr-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecr_harvester
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

  ecr-frontend:
    image: ghcr.io/dziesio/ecr-frontend:latest
    container_name: ecr-frontend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ecr-api:
        condition: service_started
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecr_harvester
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      ECR_API_BASE_URL: http://ecr-api:8081

  ecr-notifier:
    image: ghcr.io/dziesio/ecr-notifier:latest
    container_name: ecr-notifier
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ecr-api:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecr_harvester
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      ECR_API_BASE_URL: http://ecr-api:8081
      BARK_DEVICE_KEY: ${BARK_DEVICE_KEY}
      NOTIFIER_POLL_INTERVAL_MS: ${NOTIFIER_POLL_INTERVAL_MS:-300000}

volumes:
  postgres_data:
