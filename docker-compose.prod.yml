# Production compose — uses pre-built images from ghcr.io instead of local builds.
# On the VPS: use deploy.sh instead of running docker compose directly.

name: ecr

services:

  postgres:
    image: postgres:16-alpine
    container_name: ecr-postgres
    restart: unless-stopped
    command: >
      postgres
        -c shared_buffers=32MB
        -c effective_cache_size=64MB
        -c max_connections=40
        -c work_mem=2MB
    environment:
      POSTGRES_DB: ecr_harvester
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecr_harvester"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 96M

  ecr-harvester:
    image: ghcr.io/dziesio/ecr-harvester:latest
    container_name: ecr-harvester
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecr_harvester
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 3
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      LIBRUS_USERNAME: ${LIBRUS_USERNAME}
      LIBRUS_PASSWORD: ${LIBRUS_PASSWORD}
      LIBRUS_FULL_NAME: ${LIBRUS_FULL_NAME:-Student}
      LIBRUS_URL_GRADES: ${LIBRUS_URL_GRADES:-https://synergia.librus.pl/przegladaj_oceny/uczen}
      LIBRUS_URL_MESSAGES: ${LIBRUS_URL_MESSAGES:-https://synergia.librus.pl/wiadomosci}
      LIBRUS_URL_ATTENDANCE: ${LIBRUS_URL_ATTENDANCE:-https://synergia.librus.pl/przegladaj_nb/uczen}
      LIBRUS_URL_ANNOUNCEMENTS: ${LIBRUS_URL_ANNOUNCEMENTS:-https://synergia.librus.pl/ogloszenia}
      SCRAPER_PEAK_INTERVAL_MINUTES: ${SCRAPER_PEAK_INTERVAL_MINUTES:-15}
      SCRAPER_OFFPEAK_INTERVAL_MINUTES: ${SCRAPER_OFFPEAK_INTERVAL_MINUTES:-60}
      SCRAPER_JITTER_MINUTES: ${SCRAPER_JITTER_MINUTES:-3}
      SCRAPER_PROXY_LIST: ${SCRAPER_PROXY_LIST:-}
      SCRAPER_PROXY_USER: ${SCRAPER_PROXY_USER:-}
      SCRAPER_PROXY_PASS: ${SCRAPER_PROXY_PASS:-}
      JAVA_TOOL_OPTIONS: "-Xms48m -Xmx160m -XX:MaxMetaspaceSize=80m -XX:ReservedCodeCacheSize=32m -XX:+UseG1GC -XX:+UseContainerSupport"
    deploy:
      resources:
        limits:
          memory: 320M

  ecr-api:
    image: ghcr.io/dziesio/ecr-api:latest
    container_name: ecr-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecr_harvester
    deploy:
      resources:
        limits:
          memory: 64M

  ecr-frontend:
    image: ghcr.io/dziesio/ecr-frontend:latest
    container_name: ecr-frontend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ecr-api:
        condition: service_started
    ports:
      - "40445:8082"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecr_harvester
      ECR_API_BASE_URL: http://ecr-api:8081
      SECRET_KEY: ${FRONTEND_SECRET_KEY:-libehub-change-me}
    deploy:
      resources:
        limits:
          memory: 80M

  ecr-notifier:
    image: ghcr.io/dziesio/ecr-notifier:latest
    container_name: ecr-notifier
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ecr-api:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecr_harvester
      ECR_API_BASE_URL: http://ecr-api:8081
      BARK_DEVICE_KEY: ${BARK_DEVICE_KEY}
      NOTIFIER_POLL_INTERVAL_MS: ${NOTIFIER_POLL_INTERVAL_MS:-300000}
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data:
